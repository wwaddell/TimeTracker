<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeTracker</title>
    <meta name="description" content="Log time and manage tasks across your organizations." />
    <!-- theme-color drives the chrome bar tint on mobile + the title-bar accent for the
         installed PWA. Matches the AppTheme.Instance primary. -->
    <meta name="theme-color" content="#2563EB" />
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- Favicons: SVG first (scales perfectly + recolors per dark mode if we add a CSS
         filter later), PNG fallback for browsers without SVG icon support, apple-touch
         for iOS home-screen install. -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <!-- PWA manifest — gives Chrome/Edge/Android the "Install" affordance, sets the
         standalone window name + theme color when installed. -->
    <link rel="manifest" href="manifest.webmanifest" />
    <!-- TimeTracker.Web.styles.css is the scoped-CSS bundle Blazor auto-generates from
         *.razor.css files. The project has no scoped CSS today, so the bundle is never
         emitted and the reference 404s in prod. Re-add this <link> when scoped CSS lands. -->
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <!-- Branded boot splash. Shows while the WASM payload downloads + initializes.
             The clock-with-checkmark mark matches the favicon/PWA icon so the user sees
             continuity from tab → splash → app bar. The progress bar fills based on the
             Blazor host's --blazor-load-percentage CSS var. -->
        <div class="tt-splash">
            <svg class="tt-splash-logo" viewBox="0 0 64 64" aria-hidden="true">
                <circle cx="32" cy="32" r="30" fill="#2563EB"/>
                <circle cx="32" cy="32" r="22" fill="none" stroke="#ffffff" stroke-width="2.5"/>
                <circle cx="32" cy="13" r="1.8" fill="#ffffff"/>
                <circle cx="51" cy="32" r="1.8" fill="#ffffff"/>
                <circle cx="32" cy="51" r="1.8" fill="#ffffff"/>
                <circle cx="13" cy="32" r="1.8" fill="#ffffff"/>
                <path d="M21 34 L29 42 L45 24" fill="none" stroke="#ffffff"
                      stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="tt-splash-title">TimeTracker</div>
            <div class="tt-splash-bar"><div class="tt-splash-fill"></div></div>
            <div class="tt-splash-status"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <!-- The .NET 10 Blazor WASM template ships this as
         _framework/blazor.webassembly#[.{fingerprint}].js — but the `#` is a URL
         fragment delimiter, so the browser strips everything from `#` onwards and
         404s on the unresolved name. Server-side substitution only happens for HTML
         routed through MapStaticAssets's HTML transformer; index.html served via
         MapFallbackToFile bypasses it. The static-asset manifest registers BOTH the
         fingerprinted and unfingerprinted routes, so the plain name below works and
         MapStaticAssets routes the request to the physical fingerprinted file. -->
    <script src="_framework/blazor.webassembly.js"></script>
    <!-- MSAL bridge: the Microsoft.Authentication.WebAssembly.Msal NuGet ships this JS
         file via static web assets. Without it, RemoteAuthenticationService's first call
         throws `Could not find 'AuthenticationService.init' ('AuthenticationService' was
         undefined)` — the .NET side has no global to interop into. -->
    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        // Hidden context auto-captured on every time entry. Timezone is always sent (IANA name,
        // read off Intl). Location is only requested when the user has opted in on /me; if the
        // browser denies, times out, or doesn't support it, location fields stay undefined.
        window.ttContext = {
            captureEntryContext: async function (includeLocation) {
                const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone) || null;
                const out = { timezone: tz };
                if (!includeLocation || !navigator.geolocation) {
                    return out;
                }
                try {
                    const pos = await new Promise(function (resolve) {
                        navigator.geolocation.getCurrentPosition(
                            function (p) { resolve(p); },
                            function () { resolve(null); }, // permission denied / unavailable → null
                            { enableHighAccuracy: false, timeout: 4000, maximumAge: 60000 });
                    });
                    if (pos && pos.coords) {
                        out.latitude = pos.coords.latitude;
                        out.longitude = pos.coords.longitude;
                        out.locationAccuracy = pos.coords.accuracy;
                    }
                } catch (_) { /* swallow — location is best-effort */ }
                return out;
            }
        };

        // Enter submits the quick-add note; Shift/Ctrl/Alt+Enter inserts a newline instead.
        window.ttQuickAdd = {
            bind: function (selector, dotNetRef) {
                const el = document.querySelector(selector);
                if (!el || el.dataset.ttBound) {
                    return false;
                }
                el.dataset.ttBound = '1';
                el.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.altKey) {
                        e.preventDefault();
                        dotNetRef.invokeMethodAsync('OnQuickEnter');
                    }
                });
                return true;
            }
        };

        // Register the PWA service worker. Required by Chrome/Edge to surface the
        // "Install" affordance next to the URL bar. The worker is a near-no-op (see
        // service-worker.js) so adding it doesn't change runtime behavior — it just
        // signals installability.
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/service-worker.js').catch(function () {
                    // Best-effort: failing to register a SW shouldn't break the app.
                });
            });
        }
    </script>
</body>

</html>
