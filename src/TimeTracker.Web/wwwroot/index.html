<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeTracker.Web</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- TimeTracker.Web.styles.css is the scoped-CSS bundle Blazor auto-generates from
         *.razor.css files. The project has no scoped CSS today, so the bundle is never
         emitted and the reference 404s in prod. Re-add this <link> when scoped CSS lands. -->
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        // Hidden context auto-captured on every time entry. Timezone is always sent (IANA name,
        // read off Intl). Location is only requested when the user has opted in on /me; if the
        // browser denies, times out, or doesn't support it, location fields stay undefined.
        window.ttContext = {
            captureEntryContext: async function (includeLocation) {
                const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone) || null;
                const out = { timezone: tz };
                if (!includeLocation || !navigator.geolocation) {
                    return out;
                }
                try {
                    const pos = await new Promise(function (resolve) {
                        navigator.geolocation.getCurrentPosition(
                            function (p) { resolve(p); },
                            function () { resolve(null); }, // permission denied / unavailable → null
                            { enableHighAccuracy: false, timeout: 4000, maximumAge: 60000 });
                    });
                    if (pos && pos.coords) {
                        out.latitude = pos.coords.latitude;
                        out.longitude = pos.coords.longitude;
                        out.locationAccuracy = pos.coords.accuracy;
                    }
                } catch (_) { /* swallow — location is best-effort */ }
                return out;
            }
        };

        // Enter submits the quick-add note; Shift/Ctrl/Alt+Enter inserts a newline instead.
        window.ttQuickAdd = {
            bind: function (selector, dotNetRef) {
                const el = document.querySelector(selector);
                if (!el || el.dataset.ttBound) {
                    return false;
                }
                el.dataset.ttBound = '1';
                el.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.altKey) {
                        e.preventDefault();
                        dotNetRef.invokeMethodAsync('OnQuickEnter');
                    }
                });
                return true;
            }
        };
    </script>
</body>

</html>
